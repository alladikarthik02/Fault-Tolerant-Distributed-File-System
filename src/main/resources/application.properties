server.port=8080

# DFS chunk storage
dfs.storage.root=./data/chunks
dfs.chunk.size-bytes=4194304
# 4 MB chunks

# Erasure coding
dfs.ec.data-shards=6
dfs.ec.parity-shards=3
dfs.shard.root=./data/shards

# Metadata journal
dfs.metadata.journal-path=./data/metadata/journal.log

# Logging
logging.level.com.dfs=DEBUG

# Lease management
dfs.lease.ttl-seconds=30

# Storage node cluster
dfs.nodes=http://localhost:9001,http://localhost:9002,http://localhost:9003